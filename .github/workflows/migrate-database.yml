name: Run Database Migrations

# This workflow runs database migrations on production database
# Use with EXTREME CAUTION - this modifies production data!

on:
  workflow_dispatch: # Manual trigger only (for safety)
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - production
          - staging
        default: 'staging'
      confirm:
        description: 'Type "MIGRATE" to confirm'
        required: true
        type: string

jobs:
  migrate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "MIGRATE" ]; then
            echo "❌ Migration cancelled - confirmation string incorrect"
            echo "Please type 'MIGRATE' exactly to confirm"
            exit 1
          fi
          echo "✅ Confirmation validated"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: Install dependencies
        run: |
          cd server
          npm ci

      - name: Check migration files
        run: |
          cd server
          echo "📋 Checking for migration files..."
          
          if [ ! -d "../drizzle/migrations" ]; then
            echo "❌ ERROR: No migrations directory found!"
            echo ""
            echo "You need to generate migrations locally first:"
            echo "  1. cd server"
            echo "  2. npm run db:generate"
            echo "  3. git add drizzle/migrations/"
            echo "  4. git commit -m 'Add database migrations'"
            echo "  5. git push"
            exit 1
          fi
          
          # Count migration files
          migration_count=$(find ../drizzle/migrations -name "*.sql" | wc -l)
          
          if [ "$migration_count" -eq 0 ]; then
            echo "⚠️  WARNING: No .sql migration files found!"
            echo "Migration directory exists but is empty."
            exit 1
          fi
          
          echo "✅ Found $migration_count migration file(s)"
          echo ""
          echo "Migration files:"
          ls -lh ../drizzle/migrations/
        
      - name: Run migrations & verify
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
        run: |
          cd server
          
          echo "🚀 Running migrations..."
          npm run db:migrate
          
          if [ $? -eq 0 ]; then
            echo "✅ Migrations OK, testing connection..."
            npm install pg --no-save
            node -e "
              const { Pool } = require('pg');
              const pool = new Pool({ connectionString: process.env.DATABASE_URL });
              pool.query('SELECT NOW()').then(() => {
                console.log('✅ Verified');
                process.exit(0);
              }).catch(e => { console.error('❌ Failed:', e.message); process.exit(1); });
            "
          fi

      - name: Migration summary
        if: success()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ MIGRATION SUCCESSFUL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "🗄️  Environment: ${{ inputs.environment }}"
          echo "⏰ Completed:    $(date)"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "📝 Commit:       ${{ github.sha }}"
          echo ""
          echo "✅ Database schema is now up to date"
          echo "Please verify your application is working correctly"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Failure notification
        if: failure()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "❌ MIGRATION FAILED!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "🗄️  Environment: ${{ inputs.environment }}"
          echo "⏰ Failed at:    $(date)"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "📝 Commit:       ${{ github.sha }}"
          echo ""
          echo "⚠️  TROUBLESHOOTING STEPS:"
          echo "1. Check the error logs above"
          echo "2. Verify DATABASE_URL secret is correct"
          echo "3. Ensure migration files exist in drizzle/migrations/"
          echo "4. Test migrations locally first:"
          echo "   cd server && npm run db:migrate"
          echo "5. Check database connection and permissions"
          echo ""
          echo "🔄 ROLLBACK (if needed):"
          echo "You may need to manually rollback changes in your database"
          echo "Contact database administrator if needed"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"