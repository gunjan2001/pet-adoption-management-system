name: Deploy Full Stack

# This workflow deploys both backend and frontend together
# Useful for releases that touch both parts of the application

on:
  workflow_dispatch: # Manual trigger only
    inputs:
      deploy_backend:
        description: 'Deploy backend to Render'
        required: true
        type: boolean
        default: true
      deploy_frontend:
        description: 'Deploy frontend to Vercel'
        required: true
        type: boolean
        default: true

jobs:
  # Job 1: Deploy Backend
  deploy-backend:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_backend }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: Install backend dependencies
        run: |
          cd server
          npm ci

      - name: Build backend
        run: |
          cd server
          npm run build

      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "🚀 Deploying backend to Render..."
          response=$(curl -s -X POST \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
          
          echo "Response: $response"
          echo "✅ Backend deployment triggered!"

      - name: Wait for backend deployment
        run: |
          echo "⏳ Waiting for backend to deploy (60 seconds)..."
          sleep 60

  # Job 2: Deploy Frontend (depends on backend)
  deploy-frontend:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_frontend }}
    needs: deploy-backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: |
          cd client
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build frontend
        run: |
          cd client
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          cd client
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Frontend deployed to: $URL"

      - name: Wait for deployment to be ready
        run: sleep 15

  # Job 3: Run smoke tests (optional)
  smoke-test:
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    
    steps:
      - name: Test backend health
        run: |
          BACKEND_URL="${{ secrets.VITE_API_URL }}"
          
          echo "🔍 Testing backend at: $BACKEND_URL"
          
          # Wait for backend to wake up
          sleep 30
          
          # Test auth endpoint
          response=$(curl -s -o /dev/null -w "%{http_code}" $BACKEND_URL/api/auth/me || echo "000")
          
          if [ "$response" = "401" ] || [ "$response" = "200" ]; then
            echo "✅ Backend API is responding correctly (HTTP $response)"
          else
            echo "⚠️ Backend returned HTTP $response"
          fi

      - name: Deployment summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 DEPLOYMENT SUCCESSFUL!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📦 Backend:  Deployed to Render"
          echo "🌐 Frontend: Deployed to Vercel"
          echo "⏰ Time:     $(date)"
          echo ""
          echo "🔗 Your app is live!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # Job 4: Create GitHub Release (for version tags)
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [deploy-backend, deploy-frontend, smoke-test]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## 🚀 Deployment Complete
            
            **Backend:** Deployed to Render
            **Frontend:** Deployed to Vercel
            
            ### What's Changed
            - See commit history for details
            
            **Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ github.ref }}
          draft: false
          prerelease: false
