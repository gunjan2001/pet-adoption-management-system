name: Deploy Full Stack

on:
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: '🚀 Deploy backend to Render'
        required: true
        type: boolean
        default: true
      deploy_frontend:
        description: '🌐 Deploy frontend to Vercel'
        required: true
        type: boolean
        default: true

jobs:
  # ── Job 1: Deploy Backend ───────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Render
    if: ${{ inputs.deploy_backend }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: Install backend dependencies
        run: |
          cd server
          npm ci

      - name: Build backend
        run: |
          cd server
          npm run build

      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "🚀 Deploying backend to Render..."
          response=$(curl -s -X POST \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
          echo "Response: $response"
          echo "✅ Backend deployment triggered!"

      - name: Wait for backend deployment
        run: |
          echo "⏳ Waiting for backend to deploy (60 seconds)..."
          sleep 60

  # ── Job 2: Deploy Frontend ──────────────────────────────────────────────────
  # Runs independently when deploy_frontend is true.
  # When BOTH are selected, it waits for the backend first (needs is conditional).
  # When ONLY frontend is selected, it runs immediately without waiting.
  deploy-frontend:
    name: Deploy Frontend to Vercel
    if: ${{ inputs.deploy_frontend }}
    # Only depend on backend job when both are selected.
    # `always()` ensures this job still runs even if deploy-backend was skipped.
    needs: [deploy-backend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install dependencies
        run: |
          cd client
          npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Project Settings
        run: |
          cd client
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: |
          cd client
          vercel build --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Vercel
        run: |
          cd client
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  # ── Job 3: Smoke Test ───────────────────────────────────────────────────────
  # Runs after whichever jobs were selected.
  # `always()` keeps it from being skipped when one of the deploy jobs is skipped.
  smoke-test:
    name: Smoke Test
    needs: [deploy-backend, deploy-frontend]
    if: ${{ always() && (inputs.deploy_backend || inputs.deploy_frontend) }}
    runs-on: ubuntu-latest

    steps:
      - name: Test backend health
        if: ${{ inputs.deploy_backend }}
        run: |
          BACKEND_URL="${{ secrets.VITE_API_URL }}"
          echo "🔍 Testing backend at: $BACKEND_URL"
          sleep 30
          response=$(curl -s -o /dev/null -w "%{http_code}" $BACKEND_URL/api/auth/me || echo "000")
          if [ "$response" = "401" ] || [ "$response" = "200" ]; then
            echo "✅ Backend API is responding correctly (HTTP $response)"
          else
            echo "⚠️ Backend returned HTTP $response"
          fi

      - name: Deployment summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 DEPLOYMENT COMPLETE!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          if [ "${{ inputs.deploy_backend }}" = "true" ]; then
            echo "📦 Backend:  ✅ Deployed to Render"
          else
            echo "📦 Backend:  ⏭️  Skipped"
          fi
          if [ "${{ inputs.deploy_frontend }}" = "true" ]; then
            echo "🌐 Frontend: ✅ Deployed to Vercel"
          else
            echo "🌐 Frontend: ⏭️  Skipped"
          fi
          echo "⏰ Time:     $(date)"
          echo ""
          echo "🔗 Your app is live!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ── Job 4: Create GitHub Release ────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [deploy-backend, deploy-frontend, smoke-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## 🚀 Deployment Complete

            **Backend:** ${{ inputs.deploy_backend && 'Deployed to Render' || 'Skipped' }}
            **Frontend:** ${{ inputs.deploy_frontend && 'Deployed to Vercel' || 'Skipped' }}

            ### What's Changed
            - See commit history for details

            **Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ github.ref }}
          draft: false
          prerelease: false