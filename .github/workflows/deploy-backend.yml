name: Deploy Backend to Render

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'shared/**'
      - 'drizzle/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          cd server
          pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: |
          cd server
          pnpm run build

      - name: Run tests (if any)
        run: |
          cd server
          # pnpm test
        continue-on-error: true

      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -X POST \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys"

      - name: Wait for deployment
        run: sleep 60

      - name: Health check
        run: |
          # Replace with your actual backend URL
          BACKEND_URL="https://pet-adoption-api.onrender.com"
          
          # Wait for service to wake up (if it was sleeping)
          echo "Waiting for service to wake up..."
          sleep 30
          
          # Health check (modify endpoint as needed)
          response=$(curl -s -o /dev/null -w "%{http_code}" $BACKEND_URL/api/health || echo "000")
          
          if [ "$response" = "200" ] || [ "$response" = "404" ]; then
            echo "✅ Backend is responding (HTTP $response)"
            exit 0
          else
            echo "❌ Backend health check failed (HTTP $response)"
            exit 1
          fi
        continue-on-error: true

      - name: Deployment notification
        if: success()
        run: |
          echo "🚀 Backend successfully deployed to Render!"
          echo "📦 Service ID: ${{ secrets.RENDER_SERVICE_ID }}"
          echo "⏰ Deployed at: $(date)"

      - name: Failure notification
        if: failure()
        run: |
          echo "❌ Backend deployment failed!"
          echo "Please check Render dashboard for logs"
